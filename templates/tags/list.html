{% extends "base.html" %}

{% block title %}Tags — {{ config.title }}{% endblock %}

{% block content %}
<article class="taxonomy-list">
  <h1>Tags</h1>

  <ul>
    {% for term in terms %}
    <li>
      <a href="{{ term.permalink }}">{{ term.name }}</a>
      ({{ term.pages | length }})
    </li>
    {% endfor %}
  </ul>
</article>
{% endblock %}
